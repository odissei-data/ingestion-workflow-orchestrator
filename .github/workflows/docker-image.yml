name: Docker Image CI

on:
  push:
    tags:
      - "*"

env:
  SERVER_IMAGE: ghcr.io/odissei-data/prefect
  WORKER_IMAGE: ghcr.io/odissei-data/prefect-worker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Prefect Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.ref_name }}
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:latest

      - name: Build and push Prefect Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest
